<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRNL - ARBV EDITION</title>
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            background: #050505; /* Nền tối hẳn như màn hình tắt */
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Cửa sổ KRNL thiết kế cực chuẩn */
        .executor {
            width: 580px;
            height: 340px;
            background: #1a1a1a;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        /* Thanh tiêu đề giống Windows */
        .header {
            background: #2b2b2b;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            font-size: 11px;
            color: #ccc;
            border-bottom: 1px solid #3a3a3a;
        }

        .window-controls span { margin-left: 10px; cursor: pointer; }

        /* Nội dung chính chia 3 phần: Sidebar - Editor - Script List */
        .content { display: flex; flex: 1; background: #151515; }

        .side-icons {
            width: 45px;
            background: #1e1e1e;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            gap: 20px;
        }

        .icon { width: 22px; height: 22px; background: #444; border-radius: 4px; transition: 0.3s; }
        .icon.active { background: #0078d7; box-shadow: 0 0 8px #0078d7; }

        /* Trình soạn thảo script */
        .editor-area { flex: 1; position: relative; }
        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #ced444; /* Màu chữ KRNL đặc trưng */
            padding: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            outline: none;
            resize: none;
        }

        /* Danh sách script bên phải */
        .script-list {
            width: 140px;
            background: #1a1a1a;
            border-left: 1px solid #2a2a2a;
            padding: 10px;
            font-size: 12px;
            color: #aaa;
        }

        .script-item {
            padding: 5px;
            border-bottom: 1px solid #252525;
            cursor: pointer;
        }
        .script-item:hover { color: #fff; background: #252525; }

        /* Thanh điều khiển dưới cùng */
        .footer {
            height: 45px;
            background: #202020;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 8px;
            border-top: 1px solid #333;
        }

        .btn {
            background: #333;
            color: #eee;
            border: 1px solid #444;
            padding: 5px 15px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { background: #444; border-color: #0078d7; color: #fff; }

        .logo-small { height: 20px; margin-right: 10px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="executor">
    <div class="header">
        <div style="display:flex; align-items:center;">
            <img src="logo.png" class="logo-small"> <span>ARBV EXECUTOR - v5.1</span>
        </div>
        <div class="window-controls">
            <span>—</span> <span>▢</span> <span style="color:#ff4444">X</span>
        </div>
    </div>

    <div class="content">
        <div class="side-icons">
            <div class="icon active"></div>
            <div class="icon"></div>
            <div class="icon"></div>
            <div class="icon"></div>
        </div>
        
        <div class="editor-area">
            <textarea spellcheck="false">-- ARBV KRNL PRIVATE
print("System Injected!")
warn("Welcome Master Ngiaphat788")</textarea>
        </div>

        <div class="script-list">
            <div style="font-weight:bold; color:#0078d7; margin-bottom:10px;">Scripts</div>
            <div class="script-item">Fly.lua</div>
            <div class="script-item">Aimbot.lua</div>
            <div class="script-item">Speed.lua</div>
            <div class="script-item">InfiniteYield.lua</div>
        </div>
    </div>

    <div class="footer">
        <button class="btn" onclick="alert('Executing...')">Execute</button>
        <button class="btn">Clear</button>
        <button class="btn">Open File</button>
        <button class="btn">Save File</button>
        <button class="btn" style="margin-left:auto; background:#0078d7; color:white; border:none;">Inject</button>
    </div>
</div>

</body>
</html>
